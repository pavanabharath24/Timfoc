<style>
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .timer-glow {
            filter: drop-shadow(0 0 15px rgba(255, 185, 84, 0.2));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-secondary/30 min-h-screen relative overflow-x-hidden">
<div class="fixed inset-0 noise-overlay z-50"></div>
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-40 bg-[#111125] flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#ffb954]" style="font-variation-settings: 'FILL' 1;">temp_preferences_custom</span>
<h1 class="text-2xl font-['Space_Grotesk'] font-bold text-[#ffb954] tracking-tighter">Timfoc</h1>
</div>
<button class="hover:bg-[#1a1a2e] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#474553]">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen flex flex-col items-center">
<!-- Background Illustration / Focus Totem -->
<div class="relative w-full aspect-square max-w-[320px] mb-8 group">
<div class="absolute inset-0 bg-tertiary-container/20 rounded-full blur-3xl transform scale-110"></div>
<div class="relative z-10 w-full h-full flex items-center justify-center">
<img class="w-full h-full object-cover rounded-full mix-blend-screen opacity-80 grayscale-[20%] transition-transform duration-700 group-hover:scale-105" data-alt="Minimalist lo-fi digital art of a cozy desk setup with a small potted succulent and a warm lamp glow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5c6qni-zwStQReVh1Tamty5Xbj0nPXILwoPazPN5VosLRq1HQOaMQhkXKZCSo2KfimGZVjucD7LmxnrMit3v3tlWEiqpFTdXbX-7cf9lfZZZYdM8F9ul6JEYLIlslCpyCv6BqHZDTaR-o7FJ5bCwXLH0EbZ_dufW12rLILMV2MGs6DO_Mu1fC7mgzXBp7lSI3x6UUEfh0yWzfIbJVbZWkkPnlQp8diHjkGEKZwiHgRHkqv-6SQ_pQo5ye-QY0_uPVAJLg1hQuWy4U"/>
<!-- Main Timer Progress -->
<div class="absolute inset-0 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90 timer-glow">
<circle class="text-secondary-container/20" cx="50%" cy="50%" fill="transparent" r="46%" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-secondary" cx="50%" cy="50%" fill="transparent" r="46%" stroke="currentColor" stroke-dasharray="100 100" stroke-linecap="round" stroke-width="6"></circle>
</svg>
</div>
<!-- Timer Digits -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline text-7xl font-bold tracking-tighter text-on-surface">25:00</span>
<span class="font-label text-xs uppercase tracking-[0.3em] text-secondary mt-2 font-extrabold">Focus</span>
</div>
</div>
</div>
<!-- Controls -->
<div class="flex items-center gap-6 mb-12">
<button class="w-14 h-14 rounded-full border border-outline-variant/20 flex items-center justify-center hover:bg-surface-variant/40 transition-all active:scale-90">
<span class="material-symbols-outlined text-on-surface-variant">skip_next</span>
</button>
<button class="h-20 w-20 bg-secondary rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(255,185,84,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="w-14 h-14 rounded-full border border-outline-variant/20 flex items-center justify-center hover:bg-surface-variant/40 transition-all active:scale-90">
<span class="material-symbols-outlined text-on-surface-variant">refresh</span>
</button>
</div>
<!-- Session Stats Grid -->
<div class="grid grid-cols-2 gap-4 w-full">
<div class="bg-surface-variant/20 backdrop-blur-xl p-6 rounded-lg flex flex-col items-start border border-outline-variant/10 group hover:bg-surface-variant/30 transition-all">
<div class="w-10 h-10 bg-primary/10 rounded-md flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-xl">workspace_premium</span>
</div>
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest mb-1">Daily Streak</span>
<span class="text-2xl font-headline font-bold text-on-surface">12 Days</span>
</div>
<div class="bg-surface-variant/20 backdrop-blur-xl p-6 rounded-lg flex flex-col items-start border border-outline-variant/10 group hover:bg-surface-variant/30 transition-all">
<div class="w-10 h-10 bg-secondary/10 rounded-md flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-secondary text-xl">schedule</span>
</div>
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest mb-1">Focus Time</span>
<span class="text-2xl font-headline font-bold text-on-surface">4.5 Hrs</span>
</div>
</div>
<!-- Motivational Quote (Asymmetric Layout Element) -->
<div class="mt-12 ml-auto max-w-[80%] text-right opacity-60">
<p class="font-body text-sm italic text-on-surface-variant leading-relaxed">
                "The secret of getting ahead is getting started."
            </p>
<div class="h-[1px] w-12 bg-secondary/40 ml-auto mt-2"></div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#111125]/80 backdrop-blur-xl flex justify-around items-center px-4 pb-6 pt-2 rounded-t-[2rem] shadow-[0_-4px_20px_rgba(212,187,255,0.05)]">
<a class="flex flex-col items-center justify-center bg-[#ffb954] text-[#452b00] rounded-[1.5rem] px-5 py-2 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Focus</span>
</a>
<a class="flex flex-col items-center justify-center text-[#474553] px-5 py-2 hover:text-[#d4bbff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-[#474553] px-5 py-2 hover:text-[#d4bbff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">military_tech</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Badges</span>
</a>
<a class="flex flex-col items-center justify-center text-[#474553] px-5 py-2 hover:text-[#d4bbff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Settings</span>
</a>
</nav>
<!-- Floating Content Accents -->
<div class="fixed top-1/2 -right-12 w-24 h-24 bg-primary/5 rounded-full blur-2xl pointer-events-none"></div>
<div class="fixed bottom-1/4 -left-8 w-16 h-16 bg-secondary/5 rounded-full blur-xl pointer-events-none"></div>
</body></html>
